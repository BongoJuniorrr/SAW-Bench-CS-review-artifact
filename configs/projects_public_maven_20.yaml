# Public GitHub Maven Java projects for larger source-download execution.
# Revisions are fixed Git HEAD SHAs queried from GitHub on 2026-04-28.
spotbugs:
  version: "4.9.8"
  effort: "max"
  threshold: "low"
  exclude_filter: "configs/spotbugs_exclude.xml"

defaults:
  java_version: "17"
  spotbugs_categories:
    - Nullness
    - Resource management
    - Bad practice
    - Correctness
    - Dodgy code
    - Equality/hash-code
    - Performance
    - Multithreaded correctness
    - Security

projects:
  - name: commons-lang
    repo: https://github.com/apache/commons-lang.git
    commit: 0745c26dac9ac76086f10c302d252a71bf4a68c5
    build: maven
