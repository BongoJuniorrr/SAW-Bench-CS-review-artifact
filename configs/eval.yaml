seed: 7

baselines:
  local_first:
    enabled: true
  bm25:
    enabled: true
    k1: 1.5
    b: 0.75
    query_fields: [warning_message, rule_id, category]
  embedding:
    enabled: true
    model_name: sentence-transformers/all-MiniLM-L6-v2
    device: cpu
    normalize: true
  type_priority:
    enabled: true
    prior_split: validation
    proximity_weight: 0.3
  llm_reranker:
    enabled: true
    rerank_top_k: 5
    endpoint_env: SAW_LLM_ENDPOINT
    model: phi-3-mini-instruct
    temperature: 0.0

metrics:
  recall_k: [1, 3, 5]
  ndcg_k: 5
  diagnostic:
    coverage_k: [1, 3, 5, 7]
    distractor_k: 3
    non_local_recovery_k: 3

explanation_study:
  n_warnings: 77
  prompt_strategies: [local_only, full, selected]
  selected_top_k: 3
  selected_ranker: type_priority
  default_generator: deterministic_template
  optional_endpoint_judge_model: phi-3-mini-instruct
  rubric_criteria:
    - cause
    - evidence
    - factuality
    - conciseness
