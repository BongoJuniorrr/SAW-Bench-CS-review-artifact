# Public GitHub Maven Java projects for expanded source-download execution.
# Revisions are fixed Git HEAD SHAs queried from GitHub on 2026-04-29.
spotbugs:
  version: "4.9.8"
  effort: "max"
  threshold: "low"
  exclude_filter: "configs/spotbugs_exclude.xml"

defaults:
  java_version: "17"
  spotbugs_categories:
    - Nullness
    - Resource management
    - Bad practice
    - Correctness
    - Dodgy code
    - Equality/hash-code
    - Performance
    - Multithreaded correctness
    - Security

